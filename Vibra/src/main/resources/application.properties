spring.application.name=Vibra
server.port=8082

# Base de datos remota
spring.datasource.url=jdbc:mysql://178.104.225.139:3307/vibra_db
spring.datasource.username=root
spring.datasource.password=root

# Hibernate crea/actualiza tablas autom·ticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Archivos subidos ? m·ximo 50MB por archivo, 100MB total
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Servir archivos est·ticos desde la carpeta uploads/
# (los archivos subidos quedan accesibles en http://localhost:8082/uploads/...)
spring.web.resources.static-locations=classpath:/static/,file:/app/uploads/